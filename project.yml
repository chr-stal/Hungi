name: MealPrepMVP
options:
  bundleIdPrefix: com.mealprep
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MealPrepMVP:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MealPrepMVP
        createIntermediateGroups: true
    info:
      path: MealPrepMVP/Info.plist
      properties:
        CFBundleDisplayName: MealPrep
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mealprep.mvp
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
